# Ценностные примитивы (Values subsystem)
# 7 рефлексивных оценочных аттракторов.
# Источник: docs/architecture/primitives/Values_V1_0.md
#
# Позиции: [x, y, z] в диапазоне [0..32767]³
# X: высокий = Аполлон/порядок, низкий ≈ 0 = Дионис/хаос
# Y: высокий = Эрос/связь, низкий ≈ 0 = Танатос/распад
# Z: высокий = активная Воля/экспрессия, низкий = тишина
#
# Shell: доминируют L5 (когнитивный) и L8 (абстрактный).
# Масса 185–200, temperature 3–6 — холоднее чем Morality (рефлексивны, не импульсивны).
#
# Ключевое отличие от Morality: Values активируются ПОСЛЕ рефлексии.
# Ценности — гравитационные аттракторы: токен не "содержит" val_beneficial,
# а гравитационно притягивается к нему.

description: "Семь ценностных примитивов — рефлексивные оценочные аттракторы"

anchors:
  - id: "val_beneficial"
    word: "благо"
    aliases: ["beneficial", "полезно", "хорошо", "помогает", "улучшает", "благо"]
    tags: ["values", "primitive", "C0", "v1_beneficial"]
    position: [8000, 12000, 13000]
    # Y=12000 высокий Эрос: благо = связь, поддержка, соединение
    # Z=13000 высокая Воля: благо = активное действие к лучшему
    shell: [0, 0, 0, 10, 30, 5, 0, 20]
    # L5=30 когнитивный, L8=20 абстрактный принцип, L4=10 эмоциональный (благо ощущается)
    mass: 195
    temperature: 4
    description: "Увеличивает процветание, уменьшает страдание. Не 'то что нравится' (Morality), а объективно улучшает."

  - id: "val_harmful"
    word: "вред"
    aliases: ["harmful", "вредно", "плохо", "причиняет вред", "разрушает", "ухудшает"]
    tags: ["values", "primitive", "C0", "v2_harmful"]
    position: [3000, 1000, 11000]
    # X=3000 сторона хаоса: вред разрушителен
    # Y=1000 Танатос: вред = разрыв связи, уничтожение
    # Z=11000 высокая Воля: вред = активное нарушение
    shell: [5, 5, 0, 15, 25, 0, 0, 15]
    # L5=25 когнитивный, L4=15 эмоциональный (боль), L1=5 физическое
    mass: 195
    temperature: 5
    description: "Ошибка отсутствия блага ≠ нанесение вреда — поэтому отдельный аттрактор от val_beneficial."

  - id: "val_just"
    word: "справедливость"
    aliases: ["just", "справедливо", "честно", "равно", "беспристрастно", "по заслугам"]
    tags: ["values", "primitive", "C0", "v3_just"]
    position: [13000, 10000, 12000]
    # X=13000 высокий Аполлон: справедливость = абсолютная структура
    # Y=10000 Эрос: справедливость = баланс связей
    shell: [0, 0, 0, 5, 30, 10, 0, 25]
    # L5=30 когнитивный, L8=25 принцип, L6=10 социальный (социальный контракт)
    mass: 200
    temperature: 3
    description: "Равное для равного. Структурная ценность: описывает форму распределения блага/вреда."

  - id: "val_true"
    word: "истина"
    aliases: ["true", "истинно", "правда", "честно", "точно", "реально"]
    tags: ["values", "primitive", "C0", "v4_true"]
    position: [14000, 8000, 10000]
    # X=14000 максимальный Аполлон: истина = абсолютный порядок
    # Y=8000 Эрос: правда связывает людей
    shell: [0, 0, 0, 0, 35, 0, 5, 25]
    # L5=35 доминирующий когнитивный, L7=5 темпоральный (истина стабильна во времени)
    mass: 195
    temperature: 3
    description: "Приверженность точному отражению мира: честность, достоверность, отсутствие обмана."

  - id: "val_beautiful"
    word: "красота"
    aliases: ["beautiful", "красиво", "элегантно", "прекрасно", "гармонично", "совершенно"]
    tags: ["values", "primitive", "C0", "v5_beautiful"]
    position: [8000, 13000, 12000]
    # Y=13000 очень высокий Эрос: красота = максимум притяжения
    shell: [5, 15, 0, 15, 20, 5, 0, 10]
    # L2=15 сенсорное (красота воспринимаема), L4=15 эмоциональное (восхищение)
    # Единственная ценность с высоким L2 — её нужно воспринять чувствами
    mass: 185
    temperature: 6
    description: "Гармония, элегантность, структурная согласованность. Красивое решение в математике — тоже красота."

  - id: "val_meaningful"
    word: "смысл"
    aliases: ["meaningful", "значимо", "важно", "имеет смысл", "ценно", "весомо"]
    tags: ["values", "primitive", "C0", "v6_meaningful"]
    position: [9000, 11000, 14000]
    # Z=14000 очень высокая Воля: смысл = наивысшая устремлённость
    shell: [0, 0, 0, 5, 30, 5, 5, 25]
    # L5=30 когнитивный, L8=25 абстрактный (смысл требует рефлексии)
    mass: 190
    temperature: 5
    description: "Причастность к чему-то большему. val_beneficial ('помогает') ≠ val_meaningful ('имеет смысл')."

  - id: "val_forbidden"
    word: "запрет"
    aliases: ["forbidden", "нельзя", "запрещено", "никогда", "табу", "недопустимо"]
    tags: ["values", "primitive", "C0", "v7_forbidden"]
    position: [15000, 500, 15000]
    # X=15000 максимальный Аполлон: запрет = абсолютный закон
    # Y=500 почти Танатос: запрет разрывает, отделяет
    # Z=15000 максимальная Воля: самое жёсткое ограничение
    shell: [0, 0, 0, 10, 25, 5, 0, 30]
    # L8=30 абстрактный (осознанный принцип), L4=10 эмоциональный (нарушение болезненно)
    # Отличие от moral_purity: val_forbidden = осознанное "знаю почему нельзя", не инстинкт
    mass: 200
    temperature: 3
    description: "Категорическое 'нельзя'. Не просто val_harmful — абсолютный запрет, не ревизируемый контекстом."
