# Конфигурация региона Anchor Crystal V1.0
#
# Кристалл живёт в ЛОКАЛЬНЫХ координатах (u,v,w) ∈ [0..size].
# Глобальная позиция = origin + local.
#
# Выбор региона (2026-06-13):
#   - Зона [26500..30500]³ чиста: ближайший существующий якорь [26000,12000,11000]
#     находится на дистанции >21000 ед. — collision-check не требуется вручную.
#   - Максимальные координаты [30500,30500,28100] < 32767 (i16::MAX).
#   - 4000×4000 в полярной плоскости → r_max ≈ 1700 ед. (достаточно для 107+ графем).
#   - 1600 глубины → 8 слоёв по 200 ед. (C0 на поверхности, C7 внизу).

origin: [26500, 26500, 26500]
size: [4000, 4000, 1600]
min_collision_dist: 500.0
