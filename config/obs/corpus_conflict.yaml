# corpus_conflict.yaml — верификация DilemmaDetector V2.0 (§9)
#
# Стратегия: 2 чисто morality-текста + 2 чисто values-текста.
# Каждый текст активирует ОДИН subsystem-кластер, вдали от mathematics.
#
# Morality-слова вне математики:
#   "лояльность" → moral_loyalty [12000, 15000, 10000]  — очень высокий Y (Эрос)
#   "предательство" → moral_betrayal [2000, 3000, 12000] — низкий X, низкий Y
#
# Values-слова вне математики:
#   "красота" → val_beautiful [8000, 13000, 12000] — высокий Y
#   "запрет"  → val_forbidden [15000, 500, 15000]  — крайние X и Z
#
# При 50/50 распределении в окне: intensity = 1.0 → DILEMMA_THRESHOLD 0.5 перекрыт.
# natural_tension: morality ↔ values ✓ (оба направления в subsystem_dependencies.yaml)

ticks_total: 50000
snapshot_every: 1000

texts:

  # ── MORALITY 1: moral_loyalty [12000, 15000, 10000] ─────────────────────────
  - id: morality_loyalty
    content: "лояльность верность солидарность свои"
    expected_subsystem: morality
    inject_every: 7
    inject_count: 7000
    start_at_tick: 0

  # ── MORALITY 2: moral_betrayal [2000, 3000, 12000] ──────────────────────────
  - id: morality_betrayal
    content: "предательство измена нелояльность"
    expected_subsystem: morality
    inject_every: 7
    inject_count: 7000
    start_at_tick: 1

  # ── VALUES 1: val_beautiful [8000, 13000, 12000] ─────────────────────────────
  - id: values_beauty
    content: "красота красиво элегантно прекрасно"
    expected_subsystem: values
    inject_every: 7
    inject_count: 7000
    start_at_tick: 2

  # ── VALUES 2: val_forbidden [15000, 500, 15000] ───────────────────────────────
  - id: values_forbidden
    content: "запрет нельзя запрещено недопустимо"
    expected_subsystem: values
    inject_every: 7
    inject_count: 7000
    start_at_tick: 3
