# Мета-якоря абстракций (Abstractions subsystem)
# 7 мета-анкоров, кодирующих уровни абстракции C0–C5+.
# Источник: docs/architecture/primitives/Abstractions_V1_0.md
#
# ВАЖНО: Это НЕ доменные примитивы (не Writing, не Mathematics...).
# Это мета-слой, универсальный для всех подсистем.
# Каждый Frame в SUTRA гравитирует к одному из этих якорей в зависимости
# от глубины дерева composed_of (реализуется в V7-A1).
#
# Отображение уровней:
#   abstraction_raw         → C0  (сенсорный шум)
#   abstraction_pattern     → C1  (первичные кластеры)
#   abstraction_entity      → C2  (объектная абстракция)
#   abstraction_category    → C3  (категоризация)
#   abstraction_schema      → C4  (свойства и отношения)
#   abstraction_theory      → C5  (абстрактные теории)
#   abstraction_constructor → C5+ (конструктивизм / аксиогенез)
#
# Уровень абстракции = глубина дерева composed_of от C0 (не задаётся вручную).
# Требует V7-A1: composed_of: Option<Vec<u32>> в FrameAnchor.

description: "Семь мета-якорей абстракции — формальное отображение уровней C0–C5+ в пространство AXIOM"

anchors:
  - id: "abstraction_raw"
    word: "сырое"
    aliases: ["raw", "сырой", "необработанный", "сигнал", "данные", "стимул", "шум"]
    tags: ["meta", "abstraction", "C0", "a0_raw", "layer:L0"]
    position: [2000, 2000, 1000]
    # Низкий X, Y, Z: сырое — не упорядочено, не связано, не активно
    shell: [30, 20, 0, 0, 0, 0, 0, 0]
    # L1=30 физическое, L2=20 сенсорное — A0 живёт в теле, не в уме
    mass: 160
    temperature: 9
    description: "C0 — сырой сигнал без интерпретации. Пиксели, фонемы, сенсорный шум."

  - id: "abstraction_pattern"
    word: "паттерн"
    aliases: ["pattern", "кластер", "повторение", "группа", "форма", "регулярность"]
    tags: ["meta", "abstraction", "C0", "a1_pattern", "layer:L1"]
    position: [5000, 5000, 4000]
    shell: [10, 25, 5, 0, 15, 0, 0, 5]
    # L2=25 сенсорное (паттерн воспринимаем), L5=15 когнитивный (распознавание)
    mass: 170
    temperature: 7
    description: "C1 — первичный кластер. Повторяющееся различие из шума. Буква, нота, моральный сигнал."

  - id: "abstraction_entity"
    word: "сущность"
    aliases: ["entity", "объект", "предмет", "особь", "экземпляр", "вещь",
              "эмерджентность", "emergent", "возникает из", "несводим",
              "целое превосходит", "свойства целого", "из частей", "сознание из", "жизнь из"]
    tags: ["meta", "abstraction", "C0", "a2_entity", "layer:L2"]
    position: [8000, 8000, 7000]
    shell: [5, 15, 0, 5, 20, 0, 5, 10]
    # L5=20 когнитивный (постоянство = когнитивный конструкт)
    mass: 175
    temperature: 6
    description: "C2 — объект с постоянством идентичности. Слово, мелодия, культурная норма."

  - id: "abstraction_category"
    word: "категория"
    aliases: ["category", "класс", "вид", "тип", "концепт", "понятие", "таксон"]
    tags: ["meta", "abstraction", "C0", "a3_category", "layer:L3"]
    position: [10000, 9000, 10000]
    shell: [0, 5, 0, 0, 30, 5, 0, 15]
    # L5=30 когнитивный доминирует, L8=15 абстрактный (отрыв от конкретного)
    mass: 180
    temperature: 5
    description: "C3 — класс сущностей. Первый шаг к языку: слово = категория."

  - id: "abstraction_schema"
    word: "схема"
    aliases: ["schema", "отношение", "роль", "структура", "связь", "паттерн отношений", "аналогия"]
    tags: ["meta", "abstraction", "C0", "a4_schema", "layer:L4"]
    position: [11000, 11000, 12000]
    shell: [0, 0, 0, 0, 35, 0, 0, 20]
    # L5=35 когнитивный, L8=20 абстрактный
    # A4 — главный уровень для аналогий и метафор
    mass: 185
    temperature: 4
    description: "C4 — свойства и отношения. Теорема, нарратив, дилемма. Основа аналогии."

  - id: "abstraction_theory"
    word: "теория"
    aliases: ["theory", "закон", "аксиоматика", "формальная система", "принцип", "система правил"]
    tags: ["meta", "abstraction", "C0", "a5_theory", "layer:L5-L6"]
    position: [13000, 10000, 14000]
    shell: [0, 0, 0, 0, 25, 0, 5, 35]
    # L8=35 абстрактный доминирует, L5=25 когнитивный
    mass: 190
    temperature: 3
    description: "C5 — формальная система. Истинность внутренняя (дедуктивная), не эмпирическая."

  - id: "abstraction_constructor"
    word: "конструктор"
    aliases: ["constructor", "генератор", "изобретение", "конструктивизм", "новая категория", "аксиогенез"]
    tags: ["meta", "abstraction", "C0", "a6_constructor", "layer:L7"]
    position: [14000, 12000, 15000]
    # Максимальный по всем осям: конструктивизм = наивысший порядок + связь + воля
    shell: [0, 0, 0, 0, 20, 0, 5, 40]
    # L8=40 максимальный абстрактный
    # A6 = уровень аксиогенеза (DilemmaType V). Создание нового, чего раньше не было.
    mass: 195
    temperature: 4
    description: "C5+ — создание новых категорий. Конструктивизм. Уровень аксиогенеза (Dilemma Type V)."
