# Token Schema Configuration
# Semantic structure of Axiom tokens

# Token types definition
token_types:
  - name: "concept"
    description: "Abstract concept token"
    default_momentum: 1.0
    default_resonance: 440.0
    max_velocity: 100.0
    
  - name: "relation"
    description: "Relationship token"
    default_momentum: 0.8
    default_resonance: 220.0
    max_velocity: 80.0
    
  - name: "context"
    description: "Contextual information token"
    default_momentum: 0.5
    default_resonance: 880.0
    max_velocity: 60.0

# Token configuration template
token_template:
  type: object
  required: ["token_id", "token_type", "momentum", "resonance"]
  properties:
    token_id:
      type: integer
      minimum: 1
      maximum: 4294967295
    token_type:
      type: string
      enum: ["concept", "relation", "context", "custom"]
    momentum:
      type: number
      minimum: 0.0
      maximum: 100.0
      default: 1.0
    resonance:
      type: number
      minimum: 20.0
      maximum: 20000.0
      default: 440.0
    max_velocity:
      type: number
      minimum: 0.1
      maximum: 1000.0
      default: 100.0
    energy_decay_rate:
      type: number
      minimum: 0.0
      maximum: 1.0
      default: 0.01

# Token physics constraints
physics_constraints:
  momentum_conservation:
    description: "Total momentum must be conserved"
    rule: "sum(momentum) <= system_max_momentum"
    
  resonance_harmony:
    description: "Resonance frequencies should be harmonically related"
    rule: "resonance % base_frequency == 0 OR resonance / base_frequency is integer"
    
  velocity_limits:
    description: "Velocity must respect speed of information propagation"
    rule: "velocity <= max_velocity AND velocity >= 0"
