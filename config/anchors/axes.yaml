# AXIOM — Параметрические шкалы (R3, REPAIR-01 N1-N2)
#
# Оси больше НЕ являются якорями с позициями в пространстве.
# Природа токена (аполлон/дионис и т.д.) вычисляется ТОЛЬКО из подписи:
#   mass, valence, temperature и origin_domain.
#
# Этот файл — источник истины о соответствии «ось → параметр».
# Используется AxialEvaluator и документацией. НЕ является списком якорей.

axes:
  - id: "axis_apollo_dionysus"
    label: "Аполлон / Дионис"
    parameter: "mass"
    description: >
      mass высокое → Аполлон (порядок, структура, предсказуемость).
      mass низкое → Дионис (хаос, спонтанность, непредсказуемость).
    high_pole: "apollo"
    low_pole: "dionysus"

  - id: "axis_eros_thanatos"
    label: "Эрос / Танатос"
    parameter: "valence"
    description: >
      valence положительный (>128) → Эрос (жизнь, когерентность, связывание).
      valence отрицательный (<128) → Танатос (смерть, декогерентность, распад).
    high_pole: "eros"
    low_pole: "thanatos"

  - id: "axis_will_nothing"
    label: "Воля / Ничто"
    parameter: "temperature"
    description: >
      temperature высокая → Воля (интенсивность, активность, магнитуда сигнала).
      temperature низкая → Ничто (покой, пассивность, отсутствие сигнала).
    high_pole: "will"
    low_pole: "nothing"
