# Осевые якоря — определяют семантику координатных осей
# X: порядок (+) ↔ хаос (-)
# Y: жизнь (+) ↔ смерть (-)
# Z: сила (+) ↔ тишина (-)
# position: [x, y, z] в диапазоне i16 (-32768..32767)
# shell: [L1, L2, L3, L4, L5, L6, L7, L8] в диапазоне 0..255

axes:
  - id: "axis_x_pos"
    word: "порядок"
    aliases: ["структура", "логика", "закон", "кристалл", "форма"]
    tags: ["аполлон", "ось_x"]
    position: [30000, 0, 0]
    shell: [0, 0, 0, 0, 220, 0, 0, 255]
    description: "Аполлон: порядок, структура, предсказуемость"

  - id: "axis_x_neg"
    word: "хаос"
    aliases: ["творчество", "спонтанность", "поток", "случайность"]
    tags: ["дионис", "ось_x"]
    position: [-30000, 0, 0]
    shell: [0, 0, 0, 200, 100, 0, 0, 200]
    description: "Дионис: хаос, спонтанность, непредсказуемость"

  - id: "axis_y_pos"
    word: "жизнь"
    aliases: ["рост", "связь", "любовь", "создание", "рождение"]
    tags: ["эрос", "ось_y"]
    position: [0, 30000, 0]
    shell: [100, 100, 100, 200, 100, 200, 100, 100]
    description: "Эрос: жизнь, когерентность, связывание"

  - id: "axis_y_neg"
    word: "смерть"
    aliases: ["распад", "разрушение", "конец", "потеря", "забвение"]
    tags: ["танатос", "ось_y"]
    position: [0, -30000, 0]
    shell: [50, 0, 0, 200, 50, 0, 200, 150]
    description: "Танатос: смерть, декогерентность, распад"

  - id: "axis_z_pos"
    word: "сила"
    aliases: ["мощь", "власть", "яркость", "громкость", "энергия"]
    tags: ["власть", "ось_z"]
    position: [0, 0, 30000]
    shell: [100, 200, 200, 100, 100, 100, 0, 100]
    description: "Власть: магнитуда сигнала, интенсивность"

  - id: "axis_z_neg"
    word: "тишина"
    aliases: ["пустота", "ничто", "ноль", "покой", "пассивность"]
    tags: ["ничто", "ось_z"]
    position: [0, 0, -30000]
    shell: [0, 0, 0, 0, 50, 0, 0, 200]
    description: "Ничто: отсутствие сигнала, пассивность"
