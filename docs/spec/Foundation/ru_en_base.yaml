# ru_en_base.yaml — стартовая графемная палитра Anchor Crystal V1
# Регистр: одна графема (а=А). Частота: общая шкала rank (0=частейшее).
# Классы дробные → секторы веера θ. Сложность геометрией не кодируется.
# Автогенерация + ручная правка рангов по вкусу.
# rank → радиус r (частое в ядре слоя). class → угол θ. subsystem → принадлежность.

