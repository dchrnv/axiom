# GENOME V1.0 — Конституция системы Axiom (Ashti_Core V2.0)
# Соответствует Genome::default_ashti_core()
# Фаза B: загружается через Genome::from_yaml(path)

version: 1

invariants:
  token_size: 64
  connection_size: 64
  event_size: 32
  domain_config_size: 128
  max_domains: 11
  min_intensity_nonzero: true
  sutra_write_exclusive: true
  no_wall_clock_in_core: true
  event_id_monotonic: true

access_rules:
  # Arbiter
  - { module: Arbiter,   resource: SutraTokens,      permission: Read      }
  - { module: Arbiter,   resource: AshtiField,        permission: Execute   }
  - { module: Arbiter,   resource: ExperienceMemory,  permission: Read      }
  - { module: Arbiter,   resource: MayaOutput,        permission: Execute   }
  - { module: Arbiter,   resource: CodexRules,        permission: Read      }
  - { module: Arbiter,   resource: GenomeConfig,      permission: Read      }
  # Guardian
  - { module: Guardian,  resource: SutraTokens,       permission: Read      }
  - { module: Guardian,  resource: AshtiField,        permission: Control   }
  - { module: Guardian,  resource: ExperienceMemory,  permission: Control   }
  - { module: Guardian,  resource: MayaOutput,        permission: Read      }
  - { module: Guardian,  resource: CodexRules,        permission: ReadWrite }
  - { module: Guardian,  resource: GenomeConfig,      permission: Read      }
  # Heartbeat
  - { module: Heartbeat, resource: AshtiField,        permission: Read      }
  - { module: Heartbeat, resource: ExperienceMemory,  permission: Read      }
  - { module: Heartbeat, resource: GenomeConfig,      permission: Read      }
  # Shell
  - { module: Shell,     resource: AshtiField,        permission: Read      }
  - { module: Shell,     resource: ExperienceMemory,  permission: Read      }
  # Adapters
  - { module: Adapters,  resource: MayaOutput,        permission: Read      }
  # FrameWeaver — читает MAYA, пишет в EXPERIENCE; SUTRA только через CODEX
  - { module: FrameWeaver,  resource: MayaOutput,        permission: Read      }
  - { module: FrameWeaver,  resource: ExperienceMemory,  permission: ReadWrite }
  - { module: FrameWeaver,  resource: SutraTokens,       permission: Control   }
  - { module: FrameWeaver,  resource: AshtiField,        permission: Read      }
  - { module: FrameWeaver,  resource: GenomeConfig,      permission: Read      }
  # AxialEvaluator — читает EXPERIENCE для оценки Frame по философским осям
  - { module: AxialEvaluator, resource: ExperienceMemory, permission: Read      }
  - { module: AxialEvaluator, resource: MayaOutput,       permission: Read      }
  - { module: AxialEvaluator, resource: AshtiField,       permission: Read      }
  # ContextRecognizer — читает EXPERIENCE и MAYA; предлагает обновления через UCL
  - { module: ContextRecognizer, resource: ExperienceMemory, permission: Read      }
  - { module: ContextRecognizer, resource: MayaOutput,       permission: Read      }
  - { module: ContextRecognizer, resource: AshtiField,       permission: Read      }
  - { module: ContextRecognizer, resource: SutraTokens,      permission: Read      }

  # NeuralAdvisor — advisory-only; читает EXPERIENCE и AshtiField
  - { module: NeuralAdvisor, resource: ExperienceMemory, permission: Read }
  - { module: NeuralAdvisor, resource: AshtiField,       permission: Read }

  # OverDomainArbiter — исполняет AutoApply (Control) и читает advisory-источники
  - { module: OverDomainArbiter, resource: ExperienceMemory, permission: Control }
  - { module: OverDomainArbiter, resource: AshtiField,       permission: Read    }

  # Sensorium — только чтение всего; никогда не управляет (GENOME-инвариант навсегда)
  - { module: Sensorium, resource: ExperienceMemory, permission: Read }
  - { module: Sensorium, resource: AshtiField,       permission: Read }
  - { module: Sensorium, resource: MayaOutput,       permission: Read }
  - { module: Sensorium, resource: SutraTokens,      permission: Read }

  # Waves — поднимает импульс изнутри; пишет в EXPERIENCE через UCL (ReinforceFrame)
  - { module: Waves, resource: ExperienceMemory, permission: ReadWrite }
  - { module: Waves, resource: AshtiField,       permission: Read }
  - { module: Waves, resource: MayaOutput,       permission: Read }

protocol_rules:
  - { source: Sutra,      target: Experience, data_type: TokenReference,    mandatory: true  }
  - { source: Experience, target: Arbiter,    data_type: ResonanceResponse, mandatory: true  }
  - { source: Arbiter,    target: Maya,       data_type: Reflex,            mandatory: false }
  - { source: Arbiter,    target: Logic,      data_type: PatternHint,       mandatory: true  }
  - { source: Logic,      target: Maya,       data_type: ProcessingResult,  mandatory: true  }
  - { source: Logic,      target: Experience, data_type: NewExperience,     mandatory: true  }
  - { source: Maya,       target: Arbiter,    data_type: ComparisonResult,  mandatory: false }
  - { source: Arbiter,    target: Experience, data_type: Feedback,          mandatory: false }

config:
  arbiter_response_timeout: 10000
  arbiter_storm_threshold: 100
  default_max_events_per_cycle: 1000
  default_storm_threshold: 5000
  default_heartbeat_interval: 1024
  ashti_domain_count: 11

# V7-D4: GUARDIAN rules for emergent subsystem lifecycle
emergent_subsystems:
  min_primitives: 2
  min_evidence_strength: 0.3
  require_review: true
  max_active_candidates: ~

# CMB-TD-02: Cross-modal binding parameters (Cross_Modal_Binding_V1_0.md §5)
cross_modal:
  allow_binding: true
  min_co_activation: 50
  require_chrnv_approval: true
  max_bonds_total: ~
  allow_revocation: true

# G3: NeuralAdvisor — per-advisor enable/disable + Neural Integration Этап 1
neural_advisor:
  depth:
    enabled: true
    # Neural Integration Этап 1: режим советника и архитектура модели.
    # mode: rule = старые правила (дефолт), neural = нейронная модель
    # Смена mode без переобучения бессмысленна — нужен совместимый .bin.
    # При смене arch — старый .bin несовместим, нужна перетренировка.
    mode: rule
    weights_path: models/reactivation_depth.bin
    arch:
      conv1_channels: 32    # каналы первого Conv1D
      conv2_channels: 64    # каналы второго Conv1D
      conv2_kernel: 5       # ядро второго Conv1D (первый всегда 3)
      fc1_size: 32          # размер скрытого FC-слоя
  octant:
    enabled: true
  conflict:
    enabled: true
  subsystem:
    enabled: true
  emergent:
    enabled: true

# Domain_Membrane_Profiles_V1_0: физическая подпись домена (mass/valence/temp)
# Природа домена = конституция (GENOME), не оперативный конфиг.
membrane_profiles:
  101: {mass_in: 200, valence_in:  40, temp_in: 220}  # EXECUTION (+,+,+)
  102: {mass_in:  55, valence_in:  40, temp_in:  80}  # SHADOW    (-,+,-)
  103: {mass_in:  55, valence_in: -40, temp_in: 220}  # CODEX     (-,-,+)
  104: {mass_in: 200, valence_in: -40, temp_in: 220}  # MAP       (+,-,+)
  105: {mass_in: 200, valence_in:  40, temp_in:  80}  # PROBE     (+,+,-)
  106: {mass_in:  55, valence_in:  40, temp_in: 220}  # LOGIC     (-,+,+)
  107: {mass_in:  55, valence_in: -40, temp_in:  80}  # DREAM     (-,-,-)
  108: {mass_in: 200, valence_in: -40, temp_in:  80}  # VOID      (+,-,-)

membrane_blend_factor: 0.7

# V2: OverDomainArbiter — TrustConfig + CognitiveProfile из файла (ARB-TD-01, PROFILE-01)
arbiter:
  profile: balanced
  trust:
    # NeuralAdvisor (source_id=0)
    - source: 0
      type: DepthHint
      mode: AutoApply
      min_confidence: 0.75
    - source: 0
      type: OctantCorrection
      mode: RequireConfirmation
      min_confidence: 0.60
    - source: 0
      type: ConflictDiagnosis
      mode: Ignore
      min_confidence: 0.0
    - source: 0
      type: SubsystemAttribution
      mode: Ignore
      min_confidence: 0.0
    - source: 0
      type: EmergentCandidate
      mode: RequireConfirmation
      min_confidence: 0.60
    # AxialEvaluator (source_id=1)
    - source: 1
      type: OctantCorrection
      mode: RequireConfirmation
      min_confidence: 0.70
    - source: 1
      type: ConflictDiagnosis
      mode: RequireConfirmation
      min_confidence: 0.60
    - source: 1
      type: NarrativeShift
      mode: RequireConfirmation
      min_confidence: 0.55
