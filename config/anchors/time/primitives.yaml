# Темпоральные примитивы (Time subsystem)
# 7 нередуцируемых концептов темпоральности.
# Источник: docs/architecture/primitives/Time_V1_0.md
#
# Позиции: [x, y, z] в диапазоне [0..32767]³
# X: высокий = Аполлон/порядок, низкий ≈ 0 = Дионис/хаос
# Y: высокий = Эрос/связь, низкий ≈ 0 = Танатос/распад
# Z: высокий = активная Воля/экспрессия, низкий = тишина
#
# Shell: доминирует L7 (темпоральный).
# Масса 170–200, temperature 3–7.
#
# Важно: Time описывает когнитивную семантику времени (как AXIOM "думает" о времени
# в содержании), а не системную механику (COM, Heartbeat, ActivityTrace).

description: "Семь темпоральных примитивов — когнитивные атомы восприятия и понимания времени"

anchors:
  - id: "time_before"
    word: "до"
    aliases: ["before", "прежде", "предшествует", "раньше", "сперва", "сначала"]
    tags: ["time", "primitive", "C0", "t1_before"]
    position: [6000, 2000, 8000]
    # X=6000 умеренный порядок: последовательность структурна, но не абсолютна
    # Y=2000 слабый Танатос: предшествование — дистанция во времени
    # Z=8000 умеренная Воля: прошлое влияет, но не управляет
    shell: [0, 0, 0, 0, 15, 0, 40, 10]
    # L7=40 темпоральный, L5=15 когнитивный (осознание порядка), L8=10 абстрактный
    mass: 190
    temperature: 4
    description: "Асимметричное отношение предшествования. То что 'до' — уже случилось и неизменно."

  - id: "time_after"
    word: "после"
    aliases: ["after", "затем", "следует", "позже", "потом", "вслед за"]
    tags: ["time", "primitive", "C0", "t2_after"]
    position: [6000, 2000, 10000]
    # Z=10000 выше чем T1: будущее несёт больше воли/потенциала
    shell: [0, 0, 0, 0, 15, 0, 40, 10]
    mass: 190
    temperature: 4
    description: "Зеркало Before. Направлено в будущее, несёт возможность."

  - id: "time_simultaneous"
    word: "одновременно"
    aliases: ["simultaneous", "одновременный", "в то же время", "concurrently", "вместе"]
    tags: ["time", "primitive", "C0", "t3_simultaneous"]
    position: [8000, 10000, 9000]
    # Y=10000 высокий Эрос: одновременность = связь двух вещей в моменте
    # X=8000 умеренный: сопряжённость требует синхронизации
    shell: [0, 0, 0, 0, 10, 5, 40, 5]
    # L6=5 социальный (совместное присутствие — уже встреча)
    mass: 180
    temperature: 5
    description: "Два события без различимого порядка. Соприсутствие. Мультимодальное связывание."

  - id: "time_duration"
    word: "длительность"
    aliases: ["duration", "длина", "протяжённость", "interval", "span", "пока"]
    tags: ["time", "primitive", "C0", "t4_duration"]
    position: [5000, 5000, 7000]
    # Нейтральные X и Y: длительность сама по себе не ценностно окрашена
    shell: [0, 5, 0, 0, 15, 0, 45, 10]
    # L7=45 доминирует (длительность — чистое время), L2=5 сенсорное (чувство течения)
    mass: 185
    temperature: 5
    description: "Не момент, а отрезок. Событие занимает время — у него есть начало и конец."

  - id: "time_periodic"
    word: "цикл"
    aliases: ["periodic", "цикличность", "ритм", "rhythm", "cycle", "повтор", "снова"]
    tags: ["time", "primitive", "C0", "t5_periodic"]
    position: [10000, 7000, 9000]
    # X=10000 высокий Аполлон: цикл структурен, повторяем, законен
    # Y=7000 Эрос: возврат = связь с прошлым собой
    shell: [0, 0, 0, 0, 20, 0, 35, 5]
    # L5=20 когнитивный (распознавание паттерна), L7=35 темпоральный
    mass: 185
    temperature: 6
    description: "Паттерн, возвращающийся через интервал. Цикл предсказуем — отличие живого от мёртвого."

  - id: "time_irreversible"
    word: "необратимо"
    aliases: ["irreversible", "необратимость", "entropy", "нельзя вернуть", "навсегда"]
    tags: ["time", "primitive", "C0", "t6_irreversible"]
    position: [12000, 1000, 14000]
    # X=12000 высокий Аполлон: необратимость — закон, абсолютная структура
    # Y=1000 слабый Танатос: что ушло — ушло, разрыв связи
    # Z=14000 очень высокая Воля: сильнейшее ограничение
    shell: [5, 0, 0, 0, 20, 0, 40, 15]
    # L8=15 абстрактный принцип (стрела времени), L1=5 физическое (энтропия телесна)
    mass: 195
    temperature: 3
    description: "Стрела времени. Асимметрия T1/T2. Основа дилемм Type V: необратимость → нет стандартного разрешения."

  - id: "time_horizon"
    word: "горизонт"
    aliases: ["horizon", "предел памяти", "planning horizon", "видимое будущее", "давно"]
    tags: ["time", "primitive", "C0", "t7_horizon"]
    position: [7000, 6000, 13000]
    # Z=13000 высокая Воля: горизонт — напряжение между знаемым и незнаемым
    shell: [0, 0, 0, 0, 25, 0, 35, 15]
    # L5=25 когнитивный (планирование требует осознания горизонта)
    # L8=15 абстрактный (горизонт — концепция, не восприятие)
    mass: 180
    temperature: 7
    description: "Граница обозримого во времени. SHORT/MID/LONG ActivityTrace — три горизонта памяти."
