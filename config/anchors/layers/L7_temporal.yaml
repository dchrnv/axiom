# Якоря семантического слоя L7 (Temporal)
# Время, последовательность, изменение, длительность

layer: L7_temporal
description: "Временные отношения: прошлое, будущее, длительность, последовательность, ритм"

anchors:
  - word: "время"
    aliases: ["момент", "период", "эпоха", "мгновение"]
    tags: ["временное", "базовый"]
    position: [5000, 0, 5000]
    shell: [0, 0, 0, 0, 50, 0, 255, 50]

  - word: "прошлое"
    aliases: ["раньше", "прежде", "было", "история", "память"]
    tags: ["временное", "ретроспектива"]
    position: [-5000, -3000, 5000]
    shell: [0, 0, 0, 30, 80, 0, 240, 0]

  - word: "будущее"
    aliases: ["потом", "завтра", "ожидание", "план", "прогноз"]
    tags: ["временное", "перспектива"]
    position: [8000, 5000, 3000]
    shell: [0, 0, 0, 30, 80, 0, 240, 30]

  - word: "изменение"
    aliases: ["переход", "эволюция", "превращение", "сдвиг"]
    tags: ["временное", "динамика"]
    position: [5000, 8000, 0]
    shell: [30, 0, 50, 30, 50, 0, 230, 30]

  - word: "длительность"
    aliases: ["продолжительность", "долго", "быстро", "миг"]
    tags: ["временное", "измерение"]
    position: [3000, -3000, 8000]
    shell: [0, 0, 0, 0, 50, 0, 240, 0]

  - word: "последовательность"
    aliases: ["порядок", "очерёдность", "этап", "шаг", "процесс"]
    tags: ["временное", "структура"]
    position: [10000, 0, 10000]
    shell: [0, 0, 30, 0, 80, 0, 220, 50]

  - word: "начало"
    aliases: ["старт", "исток", "рождение", "первый"]
    tags: ["временное", "граница"]
    position: [3000, 8000, 5000]
    shell: [50, 30, 0, 30, 30, 0, 230, 0]

  - word: "конец"
    aliases: ["финал", "завершение", "итог", "последний"]
    tags: ["временное", "граница"]
    position: [3000, -5000, 5000]
    shell: [30, 20, 0, 50, 30, 0, 230, 0]

  - word: "сейчас"
    aliases: ["настоящее", "текущий", "данный момент", "здесь"]
    tags: ["временное", "настоящее"]
    position: [5000, 3000, 8000]
    shell: [50, 80, 50, 30, 50, 0, 240, 0]
