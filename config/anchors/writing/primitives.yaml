# Графические примитивы письма (Writing subsystem)
# 7 атомарных элементов из которых строятся все письменные символы.
# Источник: docs/architecture/Writing_V1_0.md
#
# Позиции: [x, y, z] в диапазоне [0..32767]³ (content anchors, positive-only)
# X: высокий = структура/порядок, низкий (ок. 0) = диониссийский/хаос
# Y: высокий = жизнь/связь, низкий (ок. 0) = смерть/распад
# Z: высокий = сила/выраженность, низкий (ок. 0) = тишина/отсутствие

description: "Семь графических примитивов письма — нередуцируемые атомы визуального языка"

