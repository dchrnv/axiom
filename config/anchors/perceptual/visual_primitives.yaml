# L0 Visual Primitives — базовые перцептивные примитивы зрительной системы.
#
# Слой: L0. Используются VisionPerceptor, НЕ TextPerceptor.match_text().
# Источник: Universal_Grounding_Stack.md §3
#
# Позиции: регион [-10000..-5500, -5000..-2500, -1000..1500]
# Shell: доминирует L1 (перцептивный), умеренный L2 (структурный)
# Масса: 120–150 (лёгкие примитивы — строительные блоки)
# Температура: 4–6 (стабильные, редко изменяются)

description: "L0 визуальные примитивы — базовые визуальные компоненты без семантики"
