# Моральные примитивы (Morality subsystem)
# 7 пред-рациональных моральных оснований (Haidt Moral Foundations Theory).
# Источник: docs/architecture/primitives/Morality_V1_0.md
#
# Позиции: [x, y, z] в диапазоне [0..32767]³
# X: высокий = Аполлон/порядок, низкий ≈ 0 = Дионис/хаос
# Y: высокий = Эрос/связь, низкий ≈ 0 = Танатос/распад
# Z: высокий = активная Воля/экспрессия, низкий = тишина
#
# Shell доминанты: L1 (физический), L4 (эмоциональный), L6 (социальный).
# Temperature 5–8 — горячее, чем Values: моральные сигналы пред-рациональны и быстры.
#
# Ключевое отличие от Values: Morality активируется до рефлексии.
# moral_harm != val_harmful: первый — мгновенная тревога ("ай!"),
# второй — взвешенная оценка ("это наносит долгосрочный вред").

description: "Семь моральных примитивов — пред-рациональные основания морального опыта (по Хайдту)"

anchors:
  - id: "moral_care"
    word: "забота"
    aliases: ["care", "заботиться", "защитить", "беречь", "нуртурировать", "помочь слабому"]
    tags: ["morality", "primitive", "C0", "m1_care"]
    position: [7000, 14000, 8000]
    # Y=14000 очень высокий Эрос: забота = максимальная связь
    # X=7000 умеренный: забота не всегда структурна
    # Z=8000 умеренная Воля: забота = активное действие
    shell: [15, 10, 5, 20, 5, 5, 0, 0]
    # L1=15 физическое (телесная защита), L4=20 эмоциональный (сочувствие)
    mass: 190
    temperature: 6
    description: "Забота/нуртурирование — защита уязвимого. Эволюционный корень: родительская забота."

  - id: "moral_harm"
    word: "вред-сигнал"
    aliases: ["harm", "боль", "опасность", "тревога", "ранить", "повредить"]
    tags: ["morality", "primitive", "C0", "m2_harm"]
    position: [2000, 500, 11000]
    # X=2000 Дионис: вред = разрушение порядка
    # Y=500 Танатос: вред = разрыв связи, уничтожение
    # Z=11000 высокая Воля: боль — это активный сигнал
    shell: [20, 15, 0, 25, 0, 0, 0, 0]
    # L1=20 физическое (боль телесна), L4=25 эмоциональный (аффект тревоги)
    mass: 190
    temperature: 8
    description: "Немедленный сигнал боли/опасности. Не val_harmful — это рефлекс, не оценка."

  - id: "moral_fair"
    word: "честность-чувство"
    aliases: ["fair", "честно", "поровну", "по справедливости", "не обманывай"]
    tags: ["morality", "primitive", "C0", "m3_fair"]
    position: [11000, 10000, 8000]
    # X=11000 высокий Аполлон: справедливость = порядок
    # Y=10000 Эрос: справедливость = баланс связей
    shell: [0, 0, 0, 15, 10, 15, 0, 0]
    # L4=15 эмоциональный (обида от несправедливости), L6=15 социальный (реципрокность)
    mass: 185
    temperature: 6
    description: "Инстинктивное ощущение равного обращения. Дети 2 лет уже чувствуют несправедливость."

  - id: "moral_betrayal"
    word: "предательство"
    aliases: ["betrayal", "измена", "предал", "дезертир", "нелояльность", "перебежчик"]
    tags: ["morality", "primitive", "C0", "m4_betrayal"]
    position: [2000, 3000, 12000]
    # X=2000 Дионис: предательство = разрушение структуры
    # Y=3000 Танатос: разрыв связи своей группы
    # Z=12000 высокая Воля: предательство — активный акт
    shell: [0, 0, 0, 30, 5, 20, 0, 0]
    # L4=30 эмоциональный (острейшая боль), L6=20 социальный (нарушение группового контракта)
    mass: 185
    temperature: 8
    description: "Нарушение лояльности. Самый горячий примитив (temp=8): удар от своего острее чем от чужого."

  - id: "moral_loyalty"
    word: "лояльность"
    aliases: ["loyalty", "верность", "солидарность", "свои", "вместе", "не бросать"]
    tags: ["morality", "primitive", "C0", "m5_loyalty"]
    position: [12000, 15000, 10000]
    # Y=15000 максимальный Эрос: лояльность = максимум связи внутри группы
    # X=12000 высокий Аполлон: лояльность — структура, роль, обязательство
    shell: [5, 0, 0, 20, 0, 25, 0, 0]
    # L6=25 социальный (контракт группы), L4=20 эмоциональный (тепло принадлежности)
    mass: 190
    temperature: 5
    description: "Солидарность со своей группой. Полюс, противоположный moral_betrayal."

  - id: "moral_purity"
    word: "чистота"
    aliases: ["purity", "чисто", "священно", "незагрязнённо", "непорочно", "ритуально чисто"]
    tags: ["morality", "primitive", "C0", "m6_purity"]
    position: [14000, 7000, 8000]
    # X=14000 высокий Аполлон: чистота — это порядок, разделение
    # Y=7000 умеренный: чистота не обязательно связывает
    shell: [15, 10, 0, 15, 0, 5, 0, 5]
    # L1=15 физическое (телесная чистота), L2=10 сенсорное (воспринимаемая нечистота)
    mass: 180
    temperature: 5
    description: "Чистота тела/пространства/пищи. Биологический корень: защита от патогенов через отвращение."

  - id: "moral_desecration"
    word: "осквернение"
    aliases: ["desecration", "осквернить", "загрязнить", "нечистота", "скверна", "табу нарушено"]
    tags: ["morality", "primitive", "C0", "m7_desecration"]
    position: [1000, 500, 12000]
    # X=1000 максимальный Дионис: осквернение = полный хаос структуры
    # Y=500 почти Танатос: разрыв священных связей
    # Z=12000 высокая Воля: активное нарушение
    shell: [20, 15, 0, 30, 0, 0, 0, 5]
    # L4=30 эмоциональный (отвращение, ужас), L1=20 физическое (телесное отвращение)
    mass: 185
    temperature: 8
    description: "Активное нарушение чистоты. 'Неправильно на клеточном уровне' — без логического обоснования."
